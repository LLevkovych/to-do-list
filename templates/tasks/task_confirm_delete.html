{% extends "base.html" %}

{% block content %}
    <h2>Delete Task</h2>
    <p>Are you sure you want to delete the task: <strong>{{ object.content }}</strong>?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Delete</button>
        <a href="{% url 'tasks:tag-list' %}" class="btn btn-secondary">Cancel</a>
    </form>
{% endblock %}
