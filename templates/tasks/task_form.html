{% extends "base.html" %}
{% load crispy_forms_filters %}
{% load crispy_forms_tags %}

{% block content %}

  <div class="container py-4">
    <div class="row justify-content-center">
      <div class="col-md-8">
        <div class="card shadow-sm">
          <div class="card-body">
            <h2 class="card-title mb-4">
              <i class="fas {% if form.instance.pk %}fa-edit{% else %}fa-plus{% endif %} me-2"></i>
              {% if form.instance.pk %}Update Task{% else %}Create Task{% endif %}
            </h2>

            <form method="post">
              {% csrf_token %}
              <div class="mb-3">
                {{ form|crispy }}
              </div>
              <div class="mt-4 d-flex justify-content-between">
                <button type="submit" class="btn btn-primary">
                  <i class="fas fa-save me-2"></i>Save Task
                </button>
                <a href="{% url 'tasks:task-list' %}" class="btn btn-secondary">
                  <i class="fas fa-times me-2"></i>Cancel
                </a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

{% endblock %}
