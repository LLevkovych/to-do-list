{% load static %}
{% load crispy_forms_tags %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TO DO List</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>

<body>
<div class="container-fluid">
  <div class="row">
    <nav class="col-md-2 bg-dark-custom text-white min-vh-100 p-3">
      <h3 class="menu-title"><i class="fas fa-tasks me-2"></i>Menu</h3>
      <ul class="nav flex-column">
        <li class="nav-item">
          <a class="nav-link text-white {% if request.resolver_match.url_name == 'task-list' %}active{% endif %}" href="{% url 'tasks:task-list' %}">
            <i class="fas fa-home menu-item-icon"></i>Home
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link text-white {% if request.resolver_match.url_name == 'tag-list' %}active{% endif %}" href="{% url 'tasks:tag-list' %}">
            <i class="fas fa-tags menu-item-icon"></i>Tags
          </a>
        </li>
      </ul>
    </nav>

    <main class="col-md-10 p-4-custom">
      <div class="content-wrapper p-4">
        {% block content %}
        {% endblock %}
      </div>
    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
